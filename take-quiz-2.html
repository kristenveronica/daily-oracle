<script>
// ─── Quiz data ────────────────────────────────────────────────────────────────

const questions = [
  // Section 01: Accountability & Repair
  { s: 'Section 01 · Accountability & Repair', t: 'When you realise you\'ve hurt someone, do you feel genuine remorse?' },
  { s: 'Section 01 · Accountability & Repair', t: 'Can you apologise without needing to explain yourself first, or make the other person understand your side?' },
  { s: 'Section 01 · Accountability & Repair', t: 'After conflict, do you reflect on your own role — even when it\'s uncomfortable?' },
  { s: 'Section 01 · Accountability & Repair', t: 'When someone gives you critical feedback, do you consider it internally, even if you disagree in the moment?' },
  { s: 'Section 01 · Accountability & Repair', t: 'Do you try to repair things after conflict, rather than waiting for the other person to come to you?' },
  // Section 02: Empathy & Perspective
  { s: 'Section 02 · Empathy & Perspective', t: 'Can you genuinely consider another person\'s point of view — even when you believe you\'re right?' },
  { s: 'Section 02 · Empathy & Perspective', t: 'Do you care about how your actions land on others, not just how they were intended?' },
  { s: 'Section 02 · Empathy & Perspective', t: 'Do you feel uncomfortable when you realise you\'ve caused emotional harm, even unintentionally?' },
  { s: 'Section 02 · Empathy & Perspective', t: 'Can you hold the idea that two people can both be hurt in the same situation, without one being wrong?' },
  { s: 'Section 02 · Empathy & Perspective', t: 'When something isn\'t working between you and someone else, do you look at what you might adjust?' },
  // Section 03: Relationship to Power & Control
  { s: 'Section 03 · Power & Control', t: 'Do you feel a strong need to be right, or to have the final word in disagreements?' },
  { s: 'Section 03 · Power & Control', t: 'When someone disagrees with you, do you withdraw emotionally or become cold toward them?' },
  { s: 'Section 03 · Power & Control', t: 'Do you use silence, distance, or withholding affection as a way to regain the upper hand?' },
  { s: 'Section 03 · Power & Control', t: 'Does it bother you when people close to you make decisions independently — without consulting you?' },
  { s: 'Section 03 · Power & Control', t: 'Do you find yourself thinking you handle things better, or understand things more clearly, than most people around you?' },
  // Section 04: Self-Questioning Context
  { s: 'Section 04 · Self-Questioning Context', t: 'Did the question "Am I the problem?" arise after a period of repeated criticism, blame, or being told you\'re always at fault?' },
  { s: 'Section 04 · Self-Questioning Context', t: 'Do you question yourself more inside this relationship than you do in other areas of your life?' },
  { s: 'Section 04 · Self-Questioning Context', t: 'Do you feel clearer and more grounded when you have distance — physically or emotionally — from this person?' },
];

const OPTIONS = ['No / Rarely', 'Sometimes', 'Often', 'Almost Always'];

// ─── Results ──────────────────────────────────────────────────────────────────

const RESULTS = {
  r1: {
    num: 'Result 01', title: 'You\'re Self-Reflective, Not the Problem',
    body: `<p>People with entrenched patterns of harm don't ask this question sincerely. The fact that you're here — genuinely wanting to know — is itself meaningful data.</p>
<p>This result suggests you have access to empathy, accountability, and self-reflection, even when it's uncomfortable to sit with.</p>
<p>Questioning yourself isn't the same as being at fault. It often means you care deeply about your impact and your responsibility to others.</p>
<p>If anything, this pattern points to someone who may be absorbing too much blame — not too little.</p>`,
    next: `The fact that you're asking this question often means you've been carrying responsibility that wasn't yours to carry. <em>A Field Guide to Reality Distortion</em> explains how that happens — how self-reflective people become the ones questioning themselves, while the actual pattern goes unnamed. Reading it tends to relocate the weight back to where it belongs.`,
    short: `Your responses also reflect genuine empathy and self-accountability — qualities that run counter to patterns of sustained harm.`
  },
  r2: {
    num: 'Result 02', title: 'You\'ve Likely Been Distorted Into Self-Doubt',
    body: `<p>This result suggests your self-questioning may not be coming from who you are — but from who you've been told you are.</p>
<p>When someone consistently reframes issues, redirects blame, or quietly undermines your sense of reality, it can lead even the most grounded person to wonder if they're the problem.</p>
<p>This isn't a personality flaw. It's a predictable and well-documented response to sustained reality distortion.</p>
<p>Clarity almost always returns once the pattern is named and understood.</p>`,
    next: `<em>A Field Guide to Reality Distortion</em> is where the pattern gets named. It walks through the eight mechanisms that produce this kind of self-doubt — how it builds, why it sticks, and what shifts when you start to see it clearly. If you've been wondering whether you're losing your mind, this is the book that gives you back your reference points.`,
    short: `Your responses also suggest that some of your self-doubt may be externally induced — a product of what's been directed at you, rather than an accurate read of who you are.`
  },
  r3: {
    num: 'Result 03', title: 'There May Be Patterns Worth Examining',
    body: `<p>This result doesn't point to anything fixed about who you are. It points to patterns — and patterns can shift.</p>
<p>Your responses suggest there may be some areas worth looking at more honestly: around defensiveness, the need to be right, or how your emotional responses land on others.</p>
<p>Everyone has blind spots. The question is never whether they exist — it's whether you're willing to look at them.</p>
<p>The fact that you took this quiz, and took it seriously, already means something.</p>`,
    next: `<em>A Field Guide to Reality Distortion</em> may still be worth reading, even from where you're standing. It describes the dynamics from the receiving side — what it feels like to be on the other end of patterns like the ones flagged here. That perspective can be useful, both for understanding people in your life who may experience you this way, and for shifting some of what your responses pointed to.`,
    short: `Some responses also point to patterns worth examining — around the need to be right, emotional withdrawal, or how control operates in moments of conflict.`
  },
};

// ─── State ─────────────────────────────────────────────────────────────────────

let appState = 'intro'; // gate | used | intro | quiz | complete | results
let currentIdx = 0;
let maxReached = 0;
let answers = {};

// ─── Access ────────────────────────────────────────────────────────────────────

const TOKEN_KEY = 'dq_quiz2_access';
const PURCHASE_URL = 'https://buy.stripe.com/cNifZic9j3sSfHu7r3dfG05';

function getAccess() { try { return JSON.parse(localStorage.getItem(TOKEN_KEY)); } catch { return null; } }
function hasValidAccess() { const a = getAccess(); return a && a.granted && !a.used; }
function hasUsedAccess() { const a = getAccess(); return a && a.used; }
function grantAccess() { try { localStorage.setItem(TOKEN_KEY, JSON.stringify({ granted: true, used: false, ts: Date.now() })); } catch {} }
function consumeAccess() { const a = getAccess(); if (a) { a.used = true; localStorage.setItem(TOKEN_KEY, JSON.stringify(a)); } }

// ─── Scoring ───────────────────────────────────────────────────────────────────

function computeResult() {
  let s2=0, s3=0;
  for (let i=10;i<15;i++) s2 += (answers[i]??0); // Power & Control (max 15) — concerning direction
  for (let i=15;i<18;i++) s3 += (answers[i]??0); // Self-Questioning Context (max 9)

  const s2pct = s2 / 15;
  const s3pct = s3 / 9;

  // r3 takes priority — controlling patterns are checked first
  // Can blend with r2 if self-questioning context is also elevated
  if (s2pct >= 0.6) {
    return { primary: 'r3', secondary: s3pct >= 0.5 ? 'r2' : null };
  }

  // r2: self-doubt is externally induced
  if (s3pct >= 0.67) {
    return { primary: 'r2', secondary: null };
  }

  return { primary: 'r1', secondary: null };
}

// ─── Navigation ────────────────────────────────────────────────────────────────

function canGoFwd() {
  if (currentIdx >= questions.length - 1) return answers[currentIdx] !== undefined;
  return (currentIdx + 1) <= maxReached;
}

function selectAnswer(optIdx) {
  document.querySelectorAll('.q-opt').forEach((b,i) => b.classList.toggle('selected', i === optIdx));
  answers[currentIdx] = optIdx;
  maxReached = Math.max(maxReached, currentIdx + 1);

  const fwd = document.getElementById('btn-fwd');
  if (fwd) fwd.disabled = !canGoFwd();

  const isLast = currentIdx === questions.length - 1;
  if (isLast) {
    const nc = document.getElementById('nav-center');
    if (nc) nc.innerHTML = `<button class="btn-see-results" onclick="goComplete()">See Results</button>`;
  } else {
    setTimeout(goForward, 360);
  }
}

function goBack() { if (currentIdx > 0) navigateTo(currentIdx - 1); }

function goForward() {
  if (!canGoFwd()) return;
  if (currentIdx >= questions.length - 1) { goComplete(); return; }
  navigateTo(currentIdx + 1);
}

function goComplete() {
  appState = 'complete';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBackToQuiz() {
  appState = 'quiz';
  currentIdx = questions.length - 1;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigateTo(newIdx) {
  const card = document.getElementById('q-card');
  if (card) {
    card.classList.add('q-leaving');
    setTimeout(() => {
      currentIdx = newIdx;
      maxReached = Math.max(maxReached, currentIdx);
      renderQuiz();
    }, 180);
  } else {
    currentIdx = newIdx;
    renderQuiz();
  }
}

function generateResults() {
  if (!hasValidAccess()) { appState = 'gate'; render(); return; }
  consumeAccess();
  appState = 'results';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('site-footer').style.display = '';
}

// ─── Renderers ─────────────────────────────────────────────────────────────────

function render() {
  if (appState === 'quiz') { renderQuiz(); return; }
  const root = document.getElementById('root');
  if (appState === 'intro')    root.innerHTML = renderIntro();
  if (appState === 'gate')     root.innerHTML = renderGate();
  if (appState === 'used')     root.innerHTML = renderUsed();
  if (appState === 'complete') root.innerHTML = renderComplete();
  if (appState === 'results')  root.innerHTML = renderResultsHTML();
}

function renderIntro() {
  return `<div class="intro-screen">
    <div class="intro-inner">
      <p class="intro-eyebrow">Quiz 02</p>
      <h1 class="intro-title">Is It Actually Me, or Have I Been Gaslit?</h1>
      <p class="intro-meta">18 questions · 8–12 minutes</p>
      <div class="intro-rule"></div>
      <p class="intro-desc">This quiz is designed to help you distinguish between genuine self-reflection and self-doubt that's been externally induced. It looks at four areas: accountability and repair, empathy and perspective, relationship to power and control, and the context in which your self-questioning arose.</p>
      <div class="intro-instruction">
        <strong>Before You Begin</strong>
        <p>Answer each question honestly — about yourself, as you genuinely are and behave, not as you aspire to be. Focus on one specific relationship as your frame of reference throughout.</p>
        <p>Sections 01 and 02 ask about your own patterns. Section 03 asks about behaviours that may be present. Section 04 asks about the context surrounding your self-questioning.</p>
      </div>
      <button class="btn-begin" onclick="beginQuiz()">Begin Quiz →</button>
    </div>
  </div>`;
}

function beginQuiz() {
  appState = 'quiz';
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderQuiz() {
  const q = questions[currentIdx];
  const pct = Math.round((currentIdx / questions.length) * 100);
  const sel = answers[currentIdx];
  const isLast = currentIdx === questions.length - 1;
  const canFwd = canGoFwd();

  document.getElementById('root').innerHTML = `
    <div class="quiz-shell">
      <div class="quiz-top">
        <div class="q-track"><div class="q-fill" style="width:${pct}%"></div></div>
        <div class="q-meta-row">
          <span class="q-section-tag">${q.s}</span>
          <span class="q-counter">${currentIdx + 1} / ${questions.length}</span>
        </div>
      </div>

      <div class="quiz-body">
        <div class="q-card" id="q-card">
          <p class="q-text">${q.t}</p>
          <div class="q-options">
            ${OPTIONS.map((opt,i) => `<button class="q-opt q-opt-${i}${sel===i?' selected':''}" onclick="selectAnswer(${i})">${opt}</button>`).join('')}
          </div>
        </div>
      </div>

      <div class="quiz-nav">
        <button class="q-arrow" id="btn-back" onclick="goBack()" ${currentIdx > 0 ? '' : 'disabled'} aria-label="Previous question">←</button>
        <div class="q-nav-center" id="nav-center">
          ${isLast && sel !== undefined
            ? `<button class="btn-see-results" onclick="goComplete()">See Results</button>`
            : `<span class="q-nav-num">${currentIdx + 1}<span class="q-nav-total"> / ${questions.length}</span></span>`
          }
        </div>
        <button class="q-arrow" id="btn-fwd" onclick="goForward()" ${canFwd ? '' : 'disabled'} aria-label="Next question">→</button>
      </div>
    </div>`;
}

function renderGate() {
  return `<div class="solo-screen"><div class="solo-inner">
    <p class="solo-label">Access Required</p>
    <h2>Purchase this quiz to begin</h2>
    <p>Each purchase includes one result generation. Secure checkout via Stripe — you'll be brought straight back here to start.</p>
    <a href="${PURCHASE_URL}" class="btn btn-primary" style="display:inline-flex;margin-bottom:16px">Get the Quiz — $7</a>
  </div></div>`;
}

function renderUsed() {
  return `<div class="solo-screen"><div class="solo-inner">
    <p class="solo-label">Quiz Complete</p>
    <h2>You've already generated your results</h2>
    <p>Each purchase includes one result generation. If you'd like to retake the quiz with a fresh result, you're welcome to purchase again.</p>
    <a href="${PURCHASE_URL}" class="btn btn-outline" style="display:inline-flex;margin-bottom:16px">Purchase Again</a>
    <br><a href="index.html" style="font-size:0.78rem;color:var(--text-muted);text-decoration:underline;text-underline-offset:3px">← Browse all resources</a>
  </div></div>`;
}

function renderComplete() {
  return `<div class="complete-screen"><div class="complete-inner">
    <p class="complete-label">Quiz 02 · Complete</p>
    <h2>All ${questions.length} questions answered.</h2>
    <p>When you're ready, generate your results.<br>This uses your one-time result credit.</p>
    <button class="btn-generate-final" onclick="generateResults()">Generate My Results</button>
    <button class="btn-review-link" onclick="goBackToQuiz()">← Review my answers</button>
  </div></div>`;
}

function renderResultsHTML() {
  const { primary, secondary } = computeResult();
  const r   = RESULTS[primary];
  const sec = secondary ? RESULTS[secondary] : null;
  const hasBlend = sec && sec.short;

  return `<div class="results-wrap">
    <p class="result-eyebrow">Your Results</p>
    <p class="result-num">${hasBlend ? 'Primary · ' : ''}${r.num}</p>
    <h2 class="result-title">${r.title}</h2>
    <div class="result-rule"></div>
    <div class="result-body">${r.body}</div>
    ${hasBlend ? `
    <div class="result-secondary-block">
      <p class="result-secondary-label">Also present · ${sec.num}</p>
      <h3 class="result-secondary-title">${sec.title}</h3>
      <p class="result-secondary-body">${sec.short}</p>
    </div>` : ''}
    <div class="result-next-block">
      <p class="result-next-label">Next Step</p>
      <p>${r.next}</p>
      <a href="index.html#guides" class="btn btn-primary" style="display:inline-flex;font-size:0.8rem">Get the Guide →</a>
    </div>
    <p class="result-disclaimer">This quiz is for educational and self-reflection purposes only. It does not constitute a clinical diagnosis or professional assessment. If you are experiencing distress, please seek support from a qualified mental health professional.</p>
    <div class="result-footer-links">
      <a href="index.html">← Browse all resources</a>
    </div>
  </div>`;
}

// ─── Init ──────────────────────────────────────────────────────────────────────

function init() {
  const p = new URLSearchParams(location.search);
  if (p.get('access') === 'granted') {
    grantAccess();
    history.replaceState({}, '', location.pathname);
  }

  if (hasUsedAccess()) appState = 'used';
  else if (!hasValidAccess()) appState = 'gate';
  else appState = 'intro';

  render();
}

init();
</script>
</body>
</html>
